<h1>Добавить товар</h1>

<form method="post">

    {% csrf_token %}

    <input
        type="text"
        name="name"
        placeholder="Название товара"
    >

    <br><br>

    <input
        type="number"
        name="price"
        placeholder="Цена"
    >

    <br><br>

    <button type="submit">
        Добавить
    </button>

</form>
